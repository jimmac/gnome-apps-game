name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  GAME_NAME: flathub-arcade
  LOVE_VERSION: 11.5

jobs:
  build-love:
    name: Build .love bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .love file
        uses: love-actions/love-actions-core@v1
        with:
          build-list: "./assets/ ./conf.lua ./main.lua"
          package-path: ${{ env.GAME_NAME }}.love

      - name: Upload .love artifact
        uses: actions/upload-artifact@v4
        with:
          name: love-bundle
          path: ${{ env.GAME_NAME }}.love

  build-macos:
    name: Build macOS app
    needs: build-love
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download .love bundle
        uses: actions/download-artifact@v4
        with:
          name: love-bundle

      - name: Generate macOS .icns icon
        run: |
          mkdir -p icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size ./assets/flathub.png --out icon.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            if [ $double -le 1024 ]; then
              sips -z $double $double ./assets/flathub.png --out icon.iconset/icon_${size}x${size}@2x.png
            fi
          done
          iconutil -c icns icon.iconset -o flathub.icns

      - name: Download and assemble LÖVE app
        run: |
          # Download LÖVE for macOS
          curl -L -o love.zip https://github.com/love2d/love/releases/download/${{ env.LOVE_VERSION }}/love-${{ env.LOVE_VERSION }}-macos.zip
          unzip -q love.zip

          # Rename the .app bundle
          mv love.app "Flathub Arcade.app"

          # Embed the .love file
          cp ${{ env.GAME_NAME }}.love "Flathub Arcade.app/Contents/Resources/"

          # Replace the icon
          cp flathub.icns "Flathub Arcade.app/Contents/Resources/Love.icns"
          cp flathub.icns "Flathub Arcade.app/Contents/Resources/GameIcon.icns"

          # Update Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName 'Flathub Arcade'" "Flathub Arcade.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier eu.jimmac.FlathubArcade" "Flathub Arcade.app/Contents/Info.plist"

          # Ad-hoc sign so macOS doesn't reject it outright
          codesign --force --deep -s - "Flathub Arcade.app"

      - name: Zip macOS app
        run: |
          zip -r -y ${{ env.GAME_NAME }}-macos.zip "Flathub Arcade.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ${{ env.GAME_NAME }}-macos.zip

  build-windows:
    name: Build Windows exe
    needs: build-love
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download .love bundle
        uses: actions/download-artifact@v4
        with:
          name: love-bundle

      - name: Build Windows packages
        run: |
          # Download LÖVE Windows builds
          curl -L -o love-win64.zip https://github.com/love2d/love/releases/download/${{ env.LOVE_VERSION }}/love-${{ env.LOVE_VERSION }}-win64.zip
          unzip -q love-win64.zip
          mv love-${{ env.LOVE_VERSION }}-win64 win64

          # Fuse .love into exe (concatenate love.exe + game.love)
          cat win64/love.exe ${{ env.GAME_NAME }}.love > win64/FlathubArcade.exe
          rm win64/love.exe win64/lovec.exe

          # Clean up unnecessary files
          rm -f win64/changes.txt win64/readme.txt win64/game.ico win64/love.ico

          # Zip it up
          cd win64
          zip -r ../${{ env.GAME_NAME }}-windows.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ env.GAME_NAME }}-windows.zip

  release:
    name: Create GitHub Release
    needs: [build-love, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/love-bundle/${{ env.GAME_NAME }}.love
            artifacts/macos-build/${{ env.GAME_NAME }}-macos.zip
            artifacts/windows-build/${{ env.GAME_NAME }}-windows.zip
